name: CD
on:
  push:
    tags:
      - "release-*"

permissions:
  contents: write
jobs:
  build_ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
        working-directory: ./touski
        env:
          CODE_SIGNING_ALLOWED: NO

      - run: flutter build ipa --release --no-codesign
        working-directory: ./touski

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: touski-ios
          path: touski/build/ios/ipa/*.ipa

  build_apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - run: flutter pub get
        working-directory: ./touski 

      - run: flutter build apk --target lib/main.dart 
        working-directory: ./touski

      - name: Upload .apk
        uses: softprops/action-gh-release@v1
        with:
          name: touski-android
          files: |
            touski/build/app/outputs/flutter-apk/app-release.apk