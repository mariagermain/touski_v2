name: CD

on:
  push:
    branches:
      - develop
      - main
    tags:
      - "release-*"

permissions:
  contents: write

jobs:

  build_ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create .env
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > touski/lib/.env

      - name: Cache Flutter dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            **/.dart_tool
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - run: flutter pub get
        working-directory: ./touski

      - run: flutter build ipa --release --no-codesign
        working-directory: ./touski

      - name: Create IPA manually
        run: |
          cd touski
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r app-release.ipa Payload

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v5

        with:
          name: ios-build
          path: touski/build/ios/ipa/*.ipa

  build_apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5

        with:
          distribution: "temurin"
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Create .env
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > touski/lib/.env

      - name: Cache Flutter
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-


      - run: flutter pub get
        working-directory: ./touski

      - run: flutter build apk --target lib/main.dart
        working-directory: ./touski

      - name: Upload APK artifact
        uses: actions/upload-artifact@v6

        with:
          name: apk-build
          path: touski/build/app/outputs/flutter-apk/app-release.apk

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build_ios, build_apk]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v6
        with:
          name: ios-build
          path: ./artifacts

      - uses: actions/download-artifact@v6
        with:
          name: apk-build
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/*.ipa
            ./artifacts/*.apk