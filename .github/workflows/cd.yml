name: CD
on:
  push:
    branches:
      - main
      - develop

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
        working-directory: ./touski

      # Build iOS (no codesign)
      - run: flutter build ios --release --no-codesign
        working-directory: ./touski

      # Archive to .ipa (manual step with xcodebuild)
      - run: |
          cd touski/ios
          xcodebuild -workspace Runner.xcworkspace \
                     -scheme Runner \
                     -configuration Release \
                     -archivePath build/Runner.xcarchive archive

          xcodebuild -exportArchive \
                     -archivePath build/Runner.xcarchive \
                     -exportOptionsPlist ExportOptions.plist \
                     -exportPath build/ipa
  build_apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - run: flutter pub get
        working-directory: ./touski 

      - run: flutter build apk --target lib/presentation/main.dart 
        working-directory: ./touski

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: touski/build/app/outputs/flutter-apk/app-release.apk